services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory_db
    ports:
      - "5434:5432"
    volumes:
      - memory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "apps.api.main:app", "--host", "0.0.0.0", "--port", "8080"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
    working_dir: /workspace

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "apps.indexer.main"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/workspace
    working_dir: /workspace

volumes:
  memory_pgdata:
